<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <defs>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Orbit ring 1 -->
  <ellipse cx="40" cy="40" rx="28" ry="11" fill="none" stroke="url(#orbitGrad)" stroke-width="1.8" opacity="0.9"/>
  <!-- Orbit ring 2 — rotated 60deg -->
  <ellipse cx="40" cy="40" rx="28" ry="11" fill="none" stroke="url(#orbitGrad)" stroke-width="1.8" opacity="0.7"
    transform="rotate(60 40 40)"/>
  <!-- Orbit ring 3 — rotated 120deg -->
  <ellipse cx="40" cy="40" rx="28" ry="11" fill="none" stroke="url(#orbitGrad)" stroke-width="1.8" opacity="0.5"
    transform="rotate(120 40 40)"/>
  <!-- Nucleus -->
  <circle cx="40" cy="40" r="5.5" fill="url(#coreGrad)"/>
  <!-- Electron dots -->
  <circle cx="40" cy="29" r="2.2" fill="#fbbf24"/>
  <circle cx="63" cy="46" r="2.2" fill="#f59e0b" opacity="0.8"/>
  <circle cx="17" cy="46" r="2.2" fill="#f97316" opacity="0.7"/>

  <!-- ATOM wordmark -->
  <text x="82" y="50"
    font-family="'Barlow Condensed', 'Arial Narrow', sans-serif"
    font-size="38" font-weight="900" letter-spacing="4"
    fill="#f59e0b">ATOM</text>
</svg>
